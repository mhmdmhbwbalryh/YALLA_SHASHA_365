<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yalla Shasha - Loading</title>
    <style>
        /* إخفاء أي محتوى وتوسيط الأيقونة */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* لون الخلفية بيضاء */
            overflow: hidden; /* إلغاء التمرير */
        }

        /* تصميم أيقونة التحميل */
        .loader {
            width: 70px;
            height: 70px;
            border: 8px solid #f3f3f3; /* لون الدائرة الثابتة */
            border-top: 8px solid #2ecc71; /* لون الجزء المتحرك (أخضر رياضي) */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* حركة الدوران */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader"></div>

</body>
</html>
